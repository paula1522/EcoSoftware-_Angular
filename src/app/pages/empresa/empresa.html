<div class="d-flex">

  <!-- SIDEBAR LATERAL -->
  <app-barra-lateral
    [menu]="menu"
    [vistaActual]="vistaActual"
    [nombreUsuario]="nombreUsuario"
    (vistaChange)="cambiarVista($event)"
    (logout)="cerrarSesion()"
    (edit)="editarPerfil()">
  </app-barra-lateral>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="dashboard administrador flex-fill p-4">

    <!-- PANEL DE CONTROL -->
    <ng-container *ngIf="vistaActual === 'panel'">
      <app-titulo 
        titulo="Panel de Control" 
        subtitulo="Toda la información relevante de un vistazo"
        iconoBoton="bi bi-bell"
        colorBoton="outline-custom-success" 
        hoverColorBoton="custom-success-filled">
      </app-titulo>

      <app-dashboard-empresa></app-dashboard-empresa>
    </ng-container>

    <!-- SOLICITUDES -->
    <ng-container *ngIf="vistaActual === 'solicitudes'">
      <app-titulo 
        titulo="Gestión de Solicitudes" 
        subtitulo="Gestiona las solicitudes pendientes"
        [mostrarBoton]="false">
      </app-titulo>

      <app-card-a-r-solicitud></app-card-a-r-solicitud>
    </ng-container>

    <!-- EDITAR PERFIL -->
    <ng-container *ngIf="vistaActual === 'editar-perfil'">
      <app-titulo
        titulo="Editar Perfil"
        subtitulo="Actualiza tu información personal"
        iconoBoton="bi bi-eye"
        colorBoton="outline-custom-success">
      </app-titulo>
      <app-editar-usuario></app-editar-usuario>
    </ng-container>

    <!-- RECOLECCIONES -->
    <ng-container *ngIf="vistaActual === 'recolecciones'">
      <app-titulo 
        titulo="Mis Recolecciones" 
        subtitulo="Gestiona tus recolecciones activas"
        [mostrarBoton]="false">
      </app-titulo>

      <app-cards-recoleccion></app-cards-recoleccion>
    </ng-container>

   <!-- RUTAS -->
<ng-container *ngIf="vistaActual === 'rutas'">
  
  <app-titulo 
    titulo="Rutas" 
    subtitulo="Gestión de rutas" 
    [textoBoton]="mostrarNuevaSolicitud ? 'Mostrar rutas' : 'Hacer nueva solicitud'"
    iconoBoton="bi bi-plus-circle"
    colorBoton="outline-custom-success"
    hoverColorBoton="custom-success-filled"
    (clickBoton)="toggleVista()">
  </app-titulo>

  <div class="contenedor-toggle">

    <!-- FORMULARIO CREAR RUTA -->
    <ng-container *ngIf="mostrarNuevaSolicitud">
      <div class="contenido-solicitud">
        <app-crear-ruta></app-crear-ruta>
      </div>
    </ng-container>

    <!-- LISTADO DE RUTAS -->
    <ng-container *ngIf="!mostrarNuevaSolicitud">
      <div class="contenido-solicitud">
        <app-recolector-rutas></app-recolector-rutas>
      </div>
    </ng-container>

  </div>

</ng-container>


    


    <!-- PUNTOS DE RECICLAJE -->
    <ng-container *ngIf="vistaActual === 'puntos'">
      <app-titulo
        titulo="Puntos de Reciclaje"
        subtitulo="Consulta y gestiona los puntos registrados"
        [mostrarBoton]="false">
      </app-titulo>

      <div class="puntos-admin-toolbar mt-3">
        <div class="puntos-admin-actions">
          <button class="btn btn-outline-success" [class.active]="vistaPuntos === 'mis'" (click)="mostrarMisPuntos()"
            type="button">
            Mis puntos
          </button>
          <button class="btn btn-outline-success" [class.active]="vistaPuntos === 'todos'"
            (click)="mostrarTodosLosPuntos()" type="button">
            Todos los puntos
          </button>
          <button class="btn btn-success" (click)="irAPaginaMapa()" type="button">
            Mapa
          </button>
        </div>

        <div class="puntos-filters-row">
          <select class="form-select form-select-sm" [(ngModel)]="filtroTipoResiduo" (change)="filtrarPorTipoResiduo()">
            <option value="">Filtrar por tipo de residuo</option>
            <option *ngFor="let tipo of tiposResiduoDisponibles" [value]="tipo">
              {{ tipo }}
            </option>
          </select>
          <button *ngIf="filtroTipoResiduo" class="btn btn-outline-secondary btn-sm" type="button"
            (click)="limpiarFiltroResiduo()">
            Limpiar
          </button>
        </div>

        <button class="btn btn-success" type="button" (click)="abrirModalRegistrarPunto()">
          Registrar punto
        </button>
      </div>

      <div class="puntos-admin-list mt-3">
        <app-tabla [columnas]="columnasPuntos" [data]="puntosFiltrados" [cellTemplates]="puntosCellTemplates"
          [mostrarAcciones]="true" [accionesVisibles]="accionesPuntosVisibles" [accionVisiblePorFila]="accionPuntoVisible.bind(this)"
          (editar)="editarPuntoDesdeTabla($event)"
          (eliminar)="eliminarPuntoDesdeTabla($event)"
          (ver)="verPuntoDesdeTabla($event)" titulo="Puntos de reciclaje">
        </app-tabla>
      </div>

      <app-modal [isOpen]="mostrarModalRegistrarPunto"
        [title]="editandoPunto ? 'Editar punto de reciclaje' : 'Registrar punto de reciclaje'" size="lg"
        [headerColor]="'#198754'" (closed)="cerrarModalRegistrarPunto()">

        <form class="puntos-form-grid" (ngSubmit)="registrarPunto()">
          <div class="form-group">
            <label for="puntoNombre">Nombre</label>
            <input id="puntoNombre" class="form-control" type="text" [(ngModel)]="nuevoPunto.nombre" name="nombre"
              required>
          </div>

          <div class="form-group">
            <label for="puntoDireccion">Dirección</label>
            <input id="puntoDireccion" class="form-control" type="text" [(ngModel)]="nuevoPunto.direccion"
              name="direccion" required>
          </div>

          <div class="form-group">
            <label for="puntoTipoResiduo">Tipo de residuo</label>
            <input id="puntoTipoResiduo" class="form-control" type="text" [(ngModel)]="nuevoPunto.tipoResiduo"
              name="tipoResiduo" required>
          </div>

          <div class="form-group">
            <label for="puntoHorario">Horario</label>
            <input id="puntoHorario" class="form-control" type="text" [(ngModel)]="nuevoPunto.horario" name="horario"
              required>
          </div>

          <div class="form-group form-group-full">
            <label for="puntoDescripcion">Descripción</label>
            <textarea id="puntoDescripcion" class="form-control" rows="3" [(ngModel)]="nuevoPunto.descripcion"
              name="descripcion" required></textarea>
          </div>

          <p class="text-danger mb-0 form-group-full" *ngIf="errorRegistroPunto">{{ errorRegistroPunto }}</p>
          <p class="text-success mb-0 form-group-full" *ngIf="guardandoPunto && estadoRegistroPunto">
            {{ estadoRegistroPunto }}
          </p>
        </form>

        <div modal-footer class="d-flex justify-content-end gap-2 w-100">
          <button class="btn btn-outline-secondary" type="button" (click)="cerrarModalRegistrarPunto()">Cancelar</button>
          <button class="btn btn-success" type="button" [disabled]="guardandoPunto" (click)="registrarPunto()">
            {{ guardandoPunto ? (editandoPunto ? 'Actualizando...' : 'Guardando...') : (editandoPunto ? 'Actualizar punto' : 'Registrar punto') }}
          </button>
        </div>
      </app-modal>
    </ng-container>

    <!-- CAPACITACIONES -->
    <ng-container *ngIf="vistaActual === 'capacitaciones'">
      <app-titulo
        titulo="Capacitaciones"
        subtitulo="Consulta tus capacitaciones inscritas y avance del curso"
        [textoBoton]="mostrarInscripcionCapacitacion ? 'Mostrar mis capacitaciones' : 'Inscribirse a capacitación'"
        iconoBoton="bi bi-plus-circle"
        colorBoton="outline-custom-success"
        hoverColorBoton="custom-success-filled"
        [mostrarBoton]="!detalleModulosCapacitacionAbierto"
        (clickBoton)="toggleVistaCapacitaciones()">
      </app-titulo>

      <ng-container *ngIf="!mostrarInscripcionCapacitacion; else inscripcionCapacitacionesEmpresa">
        <app-mis-capacitaciones (detalleModulosChange)="onDetalleModulosChange($event)"></app-mis-capacitaciones>
      </ng-container>

      <ng-template #inscripcionCapacitacionesEmpresa>
        <app-card-crud-capacitacion (inscripcionExitosa)="onCapacitacionInscrita()"></app-card-crud-capacitacion>
      </ng-template>
    </ng-container>

    <!-- NOTICIAS -->
    <ng-container *ngIf="vistaActual === 'noticias'">
      <app-titulo
        titulo="Noticias"
        subtitulo="Entérate de las últimas novedades"
        [mostrarBoton]="false">
      </app-titulo>

      <cards-noticias></cards-noticias>
    </ng-container>

  </main>
</div>
