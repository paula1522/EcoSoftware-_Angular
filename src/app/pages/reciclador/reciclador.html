<div class="d-flex">

  <!-- SIDEBAR LATERAL -->
  <app-barra-lateral
    [menu]="menu"
    [vistaActual]="vistaActual"
    [nombreUsuario]="nombreUsuario"
    (vistaChange)="cambiarVista($event)"
    (logout)="cerrarSesion()"
    (edit)="editarPerfil()">
  </app-barra-lateral>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="dashboard administrador flex-fill p-4">

    <!-- PANEL DE CONTROL -->
    <ng-container *ngIf="vistaActual === 'panel'">
      <app-titulo 
        titulo="Panel de Control" 
        subtitulo="Toda la información relevante de un vistazo"
        iconoBoton="bi bi-bell"
        colorBoton="outline-custom-success" 
        hoverColorBoton="custom-success-filled">
      </app-titulo>

      <app-dashboard-reciclador></app-dashboard-reciclador>
    </ng-container>

    <!-- SOLICITUDES -->
    <ng-container *ngIf="vistaActual === 'solicitudes'">
      <app-titulo 
        titulo="Gestión de Solicitudes" 
        subtitulo="Gestiona las solicitudes pendientes"
        [mostrarBoton]="false">
      </app-titulo>

      <app-card-a-r-solicitud></app-card-a-r-solicitud>
    </ng-container>

    <!-- EDITAR PERFIL -->
    <ng-container *ngIf="vistaActual === 'editar-perfil'">
      <app-titulo
        titulo="Editar Perfil"
        subtitulo="Actualiza tu información personal"
        iconoBoton="bi bi-eye"
        colorBoton="outline-custom-success">
      </app-titulo>
      <app-editar-usuario></app-editar-usuario>
    </ng-container>

    <!-- RECOLECCIONES -->
    <ng-container *ngIf="vistaActual === 'recolecciones'">
      <app-titulo 
        titulo="Mis Recolecciones" 
        subtitulo="Gestiona tus recolecciones activas"
        [mostrarBoton]="false">
      </app-titulo>

      <app-cards-recoleccion></app-cards-recoleccion>
    </ng-container>

    <!-- RUTAS-->
    <ng-container *ngIf="vistaActual === 'rutas'">
      <app-titulo titulo="Rutas" subtitulo="Gestión de rutas" [mostrarBoton]="false">
      </app-titulo>

      <app-recolector-rutas></app-recolector-rutas>
    </ng-container>

    <!-- PUNTOS DE RECICLAJE -->
    <ng-container *ngIf="vistaActual === 'puntos'">
      <div class="contenido-solicitud">
        <app-titulo
          titulo="Puntos de Reciclaje"
          subtitulo="Consulta el mapa y el listado de puntos disponibles"
          [mostrarBoton]="false">
        </app-titulo>

        <div class="puntos-admin-toolbar mt-3">
          <div class="puntos-admin-actions">
            <button
              class="btn btn-outline-success"
              [class.active]="vistaPuntos === 'todos'"
              (click)="mostrarTodosLosPuntos()"
              type="button">
              Todos los puntos
            </button>
            <button
              class="btn btn-success"
              (click)="irAPaginaMapa()"
              type="button">
              Mapa
            </button>
          </div>
        </div>

        <div class="puntos-admin-list mt-3">
          <app-tabla
            [columnas]="columnasPuntos"
            [data]="puntosFiltrados"
            [cellTemplates]="puntosCellTemplates"
            [mostrarAcciones]="true"
            [accionesVisibles]="['ver']"
            (ver)="verPuntoDesdeTabla($event)"
            titulo="Todos los puntos">
          </app-tabla>
        </div>
      </div>
    </ng-container>

    <!-- CAPACITACIONES -->
    <ng-container *ngIf="vistaActual === 'capacitaciones'">
      <app-titulo
        titulo="Capacitaciones"
        subtitulo="Consulta tus capacitaciones inscritas y avance del curso"
        [textoBoton]="mostrarInscripcionCapacitacion ? 'Mostrar mis capacitaciones' : 'Inscribirse a capacitación'"
        iconoBoton="bi bi-plus-circle"
        colorBoton="outline-custom-success"
        hoverColorBoton="custom-success-filled"
        [mostrarBoton]="!detalleModulosCapacitacionAbierto"
        (clickBoton)="toggleVistaCapacitaciones()">
      </app-titulo>

      <ng-container *ngIf="!mostrarInscripcionCapacitacion; else inscripcionCapacitacionesReciclador">
        <app-mis-capacitaciones (detalleModulosChange)="onDetalleModulosChange($event)"></app-mis-capacitaciones>
      </ng-container>

      <ng-template #inscripcionCapacitacionesReciclador>
        <app-card-crud-capacitacion (inscripcionExitosa)="onCapacitacionInscrita()"></app-card-crud-capacitacion>
      </ng-template>
    </ng-container>

    <!-- NOTICIAS -->
    <ng-container *ngIf="vistaActual === 'noticias'">
      <app-titulo
        titulo="Noticias"
        subtitulo="Entérate de las últimas novedades"
        [mostrarBoton]="false">
      </app-titulo>

    </ng-container>

  </main>
</div>
