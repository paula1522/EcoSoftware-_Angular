<div class="container mt-4">
  <div class="row">
    <div class="col-md-6 col-lg-4 mb-4" *ngFor="let cap of capacitacionesPaginadas">

      <div class="capacitacion-card">

        <!-- Imagen -->
        <div class="capacitacion-image">
          <img [src]="cap.imagen || 'assets/capacitacion-default.jpg'" alt="Imagen capacitación" loading="lazy" />

          <span class="capacitacion-badge disponible">
            <i class="fas fa-leaf"></i> Disponible
          </span>
        </div>

        <!-- Contenido -->
        <div class="capacitacion-content">

          <h3 class="capacitacion-title">
            {{ cap.nombre }}
          </h3>

          <p class="capacitacion-desc">
            {{ cap.descripcion }}
          </p>

          <div class="capacitacion-info">
            <div>
              <i class="bi bi-clipboard"></i>
              {{ cap.numeroDeClases }} clases
            </div>

            <div>
              <i class="bi bi-clock"></i>
              {{ cap.duracion }}
            </div>

            <div *ngIf="cap.modulos">
              <i class="bi bi-layer-group"></i>
              {{ cap.modulos.length }} módulos
            </div>
          </div>

          <app-boton [texto]="estaInscrito(cap.id!) ? 'Inscrito' : 'Inscribirme'"
            [icono]="estaInscrito(cap.id!) ? 'bi bi-check-circle' : 'bi bi-person-plus'"
            [color]="estaInscrito(cap.id!) ? 'custom-success-filled' : 'custom-success-filled' " 
            [deshabilitado]="estaInscrito(cap.id!)"
            (click)="inscribirse(cap)"> </app-boton>

        </div>
      </div>

    </div>
  </div>
</div>
<div class="pag" *ngIf="totalPaginas > 1">

  <!-- Flecha izquierda -->
  <button class="pg" (click)="cambiarPagina(paginaActual - 1)" [disabled]="paginaActual === 1">
    ←
  </button>

  <!-- Números -->
  <ng-container *ngFor="let p of paginasMostradas">

    <span *ngIf="p === '...'" class="pg-dots">···</span>

    <button *ngIf="p !== '...'" class="pg" [class.on]="p === paginaActual" (click)="cambiarPagina(p)">
      {{ p }}
    </button>

  </ng-container>

  <!-- Flecha derecha -->
  <button class="pg" (click)="cambiarPagina(paginaActual + 1)" [disabled]="paginaActual === totalPaginas">
    →
  </button>

</div>

<app-modal [isOpen]="modalOpen" [title]="modalTitle" size="md" headerColor="#16a34a" (closed)="cerrarModal()">

  <p>{{ modalMessage }}</p>

  <div modal-footer>
    <button class="btn btn-success" (click)="cerrarModal()">
      Aceptar
    </button>
  </div>

</app-modal>


<app-modal [isOpen]="modalConfirmacion" title="Confirmar inscripción" size="md" headerColor="#16a34a"
  (closed)="modalConfirmacion = false">

  <p>
    ¿Estás seguro de que deseas inscribirte en
    <strong>{{ capSeleccionada?.nombre }}</strong>?
  </p>

  <div modal-footer class="d-flex gap-2 justify-content-end">

    <!-- Botón cancelar -->
    <app-boton texto="Cancelar" color="secondary" (click)="modalConfirmacion = false">
    </app-boton>

    <!-- Botón confirmar -->
    <app-boton texto="Sí, inscribirme" icono="bi bi-check" color="success" (click)="confirmarInscripcion()">
    </app-boton>

  </div>

</app-modal>
